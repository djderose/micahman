<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Wordy — micahman.vip</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: white;
      padding-bottom: 40px;
    }

    .back {
      position: fixed;
      top: 16px; left: 16px;
      font-size: 1rem;
      font-weight: 700;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      background: rgba(255,255,255,0.08);
      padding: 8px 16px;
      border-radius: 50px;
      transition: all 0.2s;
      z-index: 100;
    }
    .back:hover { color: white; background: rgba(255,255,255,0.15); }

    header {
      width: 100%;
      max-width: 500px;
      text-align: center;
      padding: 56px 16px 12px;
    }

    h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2.2rem, 7vw, 3.2rem);
      color: #55efc4;
    }

    .subtitle {
      color: #a8c8ff;
      font-size: 1rem;
      margin-top: 4px;
    }

    /* Hint area */
    .hint-area {
      width: 100%;
      max-width: 500px;
      padding: 0 16px;
      margin: 10px 0 6px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .hint-btn {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.9rem;
      padding: 8px 20px;
      border-radius: 50px;
      border: 2px solid rgba(85, 239, 196, 0.4);
      background: transparent;
      color: #55efc4;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .hint-btn:hover { background: rgba(85, 239, 196, 0.1); border-color: #55efc4; }
    .hint-btn:disabled { opacity: 0.35; cursor: default; }

    .hint-text {
      font-size: 0.95rem;
      color: #ffeaa7;
      font-style: italic;
      text-align: center;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Board */
    .board {
      display: grid;
      grid-template-rows: repeat(6, 1fr);
      gap: 6px;
      padding: 12px 16px;
      width: 100%;
      max-width: 340px;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }

    .tile {
      width: 100%;
      aspect-ratio: 1;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.4rem, 5vw, 1.8rem);
      color: white;
      text-transform: uppercase;
      transition: border-color 0.1s;
      position: relative;
      transform-style: preserve-3d;
    }

    .tile.filled {
      border-color: rgba(255,255,255,0.5);
      animation: pop 0.1s ease;
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    .tile.flip {
      animation: flip 0.5s ease forwards;
    }

    @keyframes flip {
      0%   { transform: rotateX(0); }
      50%  { transform: rotateX(-90deg); }
      100% { transform: rotateX(0); }
    }

    .tile.correct  { background: #00b894; border-color: #00b894; }
    .tile.present  { background: #fdcb6e; border-color: #fdcb6e; color: #1a1a2e; }
    .tile.absent   { background: #353b48; border-color: #353b48; }

    /* Shake animation for invalid word */
    .row.shake {
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }

    /* Toast message */
    .toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.95);
      color: #1a1a2e;
      font-weight: 800;
      font-size: 1rem;
      padding: 10px 24px;
      border-radius: 50px;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    /* Keyboard */
    .keyboard {
      width: 100%;
      max-width: 500px;
      padding: 8px 8px 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .key-row {
      display: flex;
      justify-content: center;
      gap: 5px;
    }

    .key {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: clamp(0.75rem, 2.5vw, 0.9rem);
      height: 52px;
      min-width: 34px;
      padding: 0 6px;
      flex: 1;
      max-width: 42px;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,0.15);
      color: white;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .key.wide { max-width: 60px; font-size: 0.75rem; }
    .key:active { transform: scale(0.94); }
    .key.correct { background: #00b894; }
    .key.present { background: #fdcb6e; color: #1a1a2e; }
    .key.absent  { background: #2d3436; }

    /* New game button */
    .new-game-btn {
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
      padding: 12px 36px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, #55efc4, #00b894);
      color: #1a1a2e;
      cursor: pointer;
      margin-top: 16px;
      box-shadow: 0 4px 20px rgba(0, 184, 148, 0.4);
      transition: transform 0.15s;
      display: none;
    }
    .new-game-btn:hover { transform: scale(1.05); }
    .new-game-btn.visible { display: inline-block; }
  </style>
</head>

      { word: "SUPER", clue: "Way better than normal — like a superhero!" },
      { word: "SWEET", clue: "A sugary taste — like candy, fruit, or a kind person." },
      { word: "SWIFT", clue: "Moving very quickly and with ease." },
      { word: "SWORD", clue: "A long metal blade carried by knights and warriors." },
      { word: "TABLE", clue: "A flat-topped piece of furniture with legs where you eat meals." },
      { word: "TASTE", clue: "The sense that lets your tongue tell if food is sweet, salty, or sour." },
      { word: "TIGER", clue: "A large orange and black striped wild cat from Asia." },
      { word: "TOAST", clue: "Bread that's been heated until it's golden brown and crispy." },
      { word: "TOKEN", clue: "A small coin or chip used instead of money — like in arcade games." },
      { word: "TOOTH", clue: "One of the hard white things in your mouth you brush every day." },
      { word: "TORCH", clue: "A stick with fire on one end — or another word for a flashlight." },
      { word: "TOUCH", clue: "The sense you use when you feel something with your fingers." },
      { word: "TOWEL", clue: "A soft cloth you dry yourself with after a bath or swim." },
      { word: "TOWER", clue: "A very tall, narrow building — like a castle tower or the Eiffel Tower." },
      { word: "TRACK", clue: "A path for running or racing — or the marks left by an animal." },
      { word: "TRAIL", clue: "A narrow path through the woods or mountains for hiking." },
      { word: "TRAIN", clue: "A long vehicle that runs on rails and carries passengers or cargo." },
      { word: "TREAT", clue: "A special, yummy reward — like ice cream or a cookie." },

      { word: "TROOP", clue: "A group of soldiers, scouts, or animals traveling together." },

      { word: "TULIP", clue: "A beautiful cup-shaped flower that comes in many bright colors in spring." },

      { word: "TWIST", clue: "To wind or turn something around — like wringing out a wet towel." },

      { word: "UPSET", clue: "Feeling sad, hurt, or bothered by something that happened." },
      { word: "VALID", clue: "Correct and accepted — like a valid ticket to get into the show." },
      { word: "VALUE", clue: "How important or useful something is — or how much it's worth." },
      { word: "VAULT", clue: "A very secure, locked room in a bank where money is kept safe." },
      { word: "VIOLA", clue: "A stringed instrument slightly bigger than a violin, with a deeper sound." },
      { word: "VISIT", clue: "To go and spend time with someone at their home." },
      { word: "VITAL", clue: "Absolutely necessary — you can't do without it." },
      { word: "VOICE", clue: "The sound that comes out of your mouth when you talk or sing." },
      { word: "WAGON", clue: "A four-wheeled cart you pull along — great for hauling toys." },
      { word: "WATCH", clue: "A small clock you wear on your wrist to tell the time." },
      { word: "WATER", clue: "The clear liquid that fills oceans, rivers, and your drinking glass." },
      { word: "WEDGE", clue: "A triangle-shaped piece — like a wedge of cheese or a door stopper." },
      { word: "WEIRD", clue: "Strange and unusual in an unexpected way." },
      { word: "WHALE", clue: "The largest animal on Earth — a huge mammal that lives in the ocean." },
      { word: "WHEAT", clue: "A grain crop grown in fields that is ground into flour for bread." },
      { word: "WHEEL", clue: "A round, spinning object that lets cars and bikes roll forward." },
      { word: "WHITE", clue: "The color of snow, clouds, and fresh paper." },
      { word: "WHOLE", clue: "All of something — not a piece, the entire thing." },
      { word: "WITCH", clue: "A magical woman in stories who flies on a broomstick and casts spells." },
      { word: "WORLD", clue: "The planet Earth and everything on it." },
      { word: "WORRY", clue: "To feel anxious and uneasy about something that might go wrong." },
      { word: "WORTH", clue: "The value of something — how much it deserves in exchange." },
      { word: "WRECK", clue: "Something badly damaged or crashed — like a car wreck." },
      { word: "YACHT", clue: "A fancy, expensive sailboat used for racing or leisure." },
      { word: "YOUNG", clue: "Not old yet — still early in life, like kids and baby animals." },
      { word: "YOUTH", clue: "The time of life when you are young — your childhood and teen years." },
      { word: "ZEBRA", clue: "A black-and-white striped African animal related to a horse." },
      { word: "ZESTY", clue: "Full of energy and flavor — lemon is zesty!" },
    ];

    const KEYBOARD_ROWS = [
      ['Q','W','E','R','T','Y','U','I','O','P'],
      ['A','S','D','F','G','H','J','K','L'],
      ['ENTER','Z','X','C','V','B','N','M','⌫']
    ];

    let secret = '';
    let clue = '';
    let currentRow = 0;
    let currentCol = 0;
    let currentGuess = [];
    let gameOver = false;
    let hintUsed = false;
    let tileEls = [];
    let keyEls = {};

    function pickWord() {
      const entry = WORDS[Math.floor(Math.random() * WORDS.length)];
      secret = entry.word;
      clue = entry.clue;
    }

    function buildBoard() {
      const board = document.getElementById('board');
      board.innerHTML = '';
      tileEls = [];
      for (let r = 0; r < 6; r++) {
        const row = document.createElement('div');
        row.classList.add('row');
        row.id = `row-${r}`;
        const rowTiles = [];
        for (let c = 0; c < 5; c++) {
          const tile = document.createElement('div');
          tile.classList.add('tile');
          row.appendChild(tile);
          rowTiles.push(tile);
        }
        board.appendChild(row);
        tileEls.push(rowTiles);
      }
    }

    function buildKeyboard() {
      const kb = document.getElementById('keyboard');
      kb.innerHTML = '';
      keyEls = {};
      KEYBOARD_ROWS.forEach(row => {
        const rowEl = document.createElement('div');
        rowEl.classList.add('key-row');
        row.forEach(key => {
          const btn = document.createElement('button');
          btn.classList.add('key');
          btn.textContent = key;
          if (key === 'ENTER' || key === '⌫') btn.classList.add('wide');
          btn.addEventListener('click', () => handleKey(key));
          rowEl.appendChild(btn);
          keyEls[key] = btn;
        });
        kb.appendChild(rowEl);
      });
    }

    function showHint() {
      if (hintUsed) return;
      hintUsed = true;
      document.getElementById('hint-text').textContent = `💡 ${clue}`;
      document.getElementById('hint-btn').disabled = true;
    }

    function handleKey(key) {
      if (gameOver) return;

      if (key === '⌫' || key === 'Backspace') {
        if (currentCol > 0) {
          currentCol--;
          currentGuess.pop();
          tileEls[currentRow][currentCol].textContent = '';
          tileEls[currentRow][currentCol].classList.remove('filled');
        }
        return;
      }

      if (key === 'ENTER' || key === 'Enter') {
        submitGuess();
        return;
      }

      if (/^[A-Za-z]$/.test(key) && currentCol < 5) {
        const letter = key.toUpperCase();
        currentGuess.push(letter);
        const tile = tileEls[currentRow][currentCol];
        tile.textContent = letter;
        tile.classList.add('filled');
        currentCol++;
      }
    }

    function submitGuess() {
      if (currentCol < 5) {
        showToast('Not enough letters!');
        shakeRow(currentRow);
        return;
      }

      const guess = currentGuess.join('');
      const result = scoreGuess(guess, secret);

      revealRow(currentRow, result, () => {
        updateKeys(guess, result);

        if (guess === secret) {
          gameOver = true;
          const msgs = ['Genius! 🧠', 'Magnificent! ✨', 'Impressive! 🌟', 'Splendid! 🎉', 'Great! 👏', 'Phew! 😅'];
          setTimeout(() => showToast(msgs[currentRow] || 'Nice!', 2500), 300);
          document.getElementById('new-game-btn').classList.add('visible');
          return;
        }

        currentRow++;
        currentCol = 0;
        currentGuess = [];

        if (currentRow >= 6) {
          gameOver = true;
          setTimeout(() => showToast(`The word was ${secret}`, 3000), 300);
          document.getElementById('new-game-btn').classList.add('visible');
        }
      });
    }

    function scoreGuess(guess, answer) {
      const result = Array(5).fill('absent');
      const answerArr = answer.split('');
      const guessArr  = guess.split('');
      const used = Array(5).fill(false);

      // First pass: correct
      for (let i = 0; i < 5; i++) {
        if (guessArr[i] === answerArr[i]) {
          result[i] = 'correct';
          used[i] = true;
          answerArr[i] = null;
        }
      }

      // Second pass: present
      for (let i = 0; i < 5; i++) {
        if (result[i] === 'correct') continue;
        const idx = answerArr.indexOf(guessArr[i]);
        if (idx !== -1) {
          result[i] = 'present';
          answerArr[idx] = null;
        }
      }

      return result;
    }

    function revealRow(row, result, callback) {
      const tiles = tileEls[row];
      tiles.forEach((tile, i) => {
        setTimeout(() => {
          tile.classList.add('flip');
          setTimeout(() => {
            tile.classList.add(result[i]);
          }, 250);
          if (i === 4) {
            setTimeout(callback, 600);
          }
        }, i * 120);
      });
    }

    function updateKeys(guess, result) {
      const priority = { correct: 3, present: 2, absent: 1 };
      for (let i = 0; i < 5; i++) {
        const letter = guess[i];
        const key = keyEls[letter];
        if (!key) continue;
        const current = key.dataset.state || '';
        const newState = result[i];
        if ((priority[newState] || 0) > (priority[current] || 0)) {
          key.classList.remove('correct', 'present', 'absent');
          key.classList.add(newState);
          key.dataset.state = newState;
        }
      }
    }

    function shakeRow(row) {
      const rowEl = document.getElementById(`row-${row}`);
      rowEl.classList.add('shake');
      rowEl.addEventListener('animationend', () => rowEl.classList.remove('shake'), { once: true });
    }

    let toastTimer = null;
    function showToast(msg, duration = 1600) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), duration);
    }

    function newGame() {
      currentRow = 0;
      currentCol = 0;
      currentGuess = [];
      gameOver = false;
      hintUsed = false;
      document.getElementById('hint-btn').disabled = false;
      document.getElementById('hint-text').textContent = '';
      document.getElementById('new-game-btn').classList.remove('visible');
      pickWord();
      buildBoard();
      buildKeyboard();
    }

    // Physical keyboard support
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey || e.metaKey || e.altKey) return;
      handleKey(e.key);
    });

    newGame();
  </script>
